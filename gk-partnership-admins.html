<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0b00;
    font-family: 'Cinzel', Georgia, serif;
    color: #e8d48a;
    padding: 0 18px 14px;
  }
  a { text-decoration: none; display: block; }
  .admin {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid #1a1500;
    transition: opacity 0.2s;
  }
  .admin:last-of-type { border-bottom: none; }
  .admin:hover { opacity: 0.75; }
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid #3a2e00;
    filter: sepia(0.15);
  }
  .info { flex: 1; min-width: 0; }
  .username {
    font-size: 11px;
    font-weight: 700;
    color: #f5d060;
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .club {
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 10px;
    color: #3a2c00;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .role {
    font-size: 7px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 7px;
    flex-shrink: 0;
  }
  .super  { background: #d4a017; color: #080600; }
  .admin-r { border: 1px solid #5a4010; color: #7a5c10; }
  .coord  { border: 1px solid #3a2e00; color: #5a4010; }
</style>
</head>
<body>

  </div>
